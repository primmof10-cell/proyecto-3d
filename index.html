<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokemon 3D Viewer</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
  color: white;
  text-align: center;
}

/* LOGO */
.logo {
  width: 400px;
  display: block;
  margin: 60px auto 20px auto;
  filter: drop-shadow(0 0 20px yellow);
  transition: 0.3s;
}

.logo:hover {
  transform: scale(1.1);
}

/* VISOR */
model-viewer {
  width: 100%;
  height: 60vh;
  background: black;
}

/* BOTONES */
.galeria {
  display: flex;
  justify-content: center;
  gap: 20px;
  padding: 20px;
  flex-wrap: wrap;
}

.galeria button {
  padding: 12px 20px;
  border: none;
  border-radius: 10px;
  background: #00c3ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.galeria button:hover {
  background: #0099cc;
  transform: scale(1.1);
  box-shadow: 0 0 10px #00c3ff;
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .logo {
    width: 250px;
  }

  model-viewer {
    height: 50vh;
  }
}
</style>

</head>

<body>

<!-- LOGO -->
<img src="img/pokemon.png" class="logo">

<!-- VISOR 3D -->
<model-viewer
  id="visor"
  src="models/escenario.glb"
  ar
  auto-rotate
  camera-controls
  shadow-intensity="1">
</model-viewer>

<!-- BOTONES -->
<div class="galeria">
  <button onclick="cambiar('models/escenario.glb')">Escenario</button>
  <button onclick="cambiar('models/pikachu.glb')">Pikachu</button>
  <button onclick="cambiar('models/pokebola.glb')">Pokebola</button>
</div>

<script>
function cambiar(ruta){
  document.getElementById("visor").src = ruta;
}
</script>

</body>
</html>
